  name: local-cluster
  labels:
    cluster.open-cluster-management.io/clusterset: mcedev
    environment: dev

#oc label managedcluster local-cluster cluster.open-cluster-management.io/clusterset=mcedev --overwrite
#oc label ManagedCluster local-cluster environment=dev